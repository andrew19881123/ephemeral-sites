{{- if .Values.ingress.enabled -}}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "ephemeral-sites.fullname" . }}-wildcard
  labels:
    {{- include "ephemeral-sites.labels" . | nindent 4 }}
  {{- with .Values.ingress.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  ingressClassName: {{ .Values.ingress.className }}
  {{- if .Values.ingress.tls.enabled }}
  tls:
    - hosts:
        - {{ .Values.wildcardHost | quote }}
      secretName: {{ if eq .Values.ingress.tls.mode "existing-secret" }}{{ .Values.ingress.tls.existingSecret }}{{ else }}{{ include "ephemeral-sites.fullname" . }}-wildcard-tls{{ end }}
  {{- end }}
  rules:
    - host: {{ .Values.wildcardHost | quote }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ include "ephemeral-sites.fullname" . }}-static
                port:
                  number: 8001
{{- end }}
