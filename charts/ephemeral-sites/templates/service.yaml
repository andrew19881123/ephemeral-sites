apiVersion: v1
kind: Service
metadata:
  name: {{ include "ephemeral-sites.fullname" . }}-api
  labels:
    {{- include "ephemeral-sites.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  ports:
    - name: http
      port: 8000
      targetPort: http-api
  selector:
    {{- include "ephemeral-sites.selectorLabels" . | nindent 4 }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "ephemeral-sites.fullname" . }}-static
  labels:
    {{- include "ephemeral-sites.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  ports:
    - name: http
      port: 8001
      targetPort: http-static
  selector:
    {{- include "ephemeral-sites.selectorLabels" . | nindent 4 }}
